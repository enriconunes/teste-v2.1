name: Claude AutoFix

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Claude AutoFix
        uses: enriconunes/claude-autofix-action@v2.1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          enable-error-log: "true"
          enable-insights: "true"
          # Test framework to run.
          # Options: "pytest" | "vitest" | "jest"
          # Default: "pytest"
          test-framework: "pytest"

          # Source language of your project.
          # Options: "python" | "typescript" | "javascript"
          # Default: "python"
          language: "python"