name: Claude AutoFix

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Claude AutoFix
        uses: enriconunes/claude-autofix-action@v2.1.2
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          enable-error-log: "true"
          enable-insights: "true"
          test-framework: "pytest"
          language: "python" 